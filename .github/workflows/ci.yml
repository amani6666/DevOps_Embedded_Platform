name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-agent2:
    name: Run Agent 2 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Test Agent 2 Execution
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python agent2.py

  build-runner-check:
    name: Build Docker Runner
    runs-on: ubuntu-latest
    needs: test-agent2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Zephyr Build Runner Container
        run: |
          docker build -t build-runner ./build-runner